<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Dashboard</title>
<link rel="icon" href="assets/logo.png" type="image/png">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#f1f5f9;
transition:.3s;
}

body.dark{
background:#000;
color:#e5e7eb;
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.task-card{
background:#f8fafc;
border:1px solid #e2e8f0;
border-radius:12px;
padding:16px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.task-card:hover{
box-shadow:0 4px 12px rgba(0,0,0,.12);
}

.task-label{
color:#64748b;
font-size:.75rem;
font-weight:700;
letter-spacing:.04em;
text-transform:uppercase;
}

.task-value{
color:#0f172a;
font-size:.95rem;
}

.priority-select{
border:1px solid #cbd5e1;
border-radius:8px;
padding:6px 8px;
color:#0f172a;
background:white;
}

.dark .card{
background:#111;
box-shadow:0 4px 20px rgba(0,0,0,.6);
}

.dark .task-card{
background:#111827;
border-color:#1f2937;
}

.dark .task-label{
color:#94a3b8;
}

.dark .task-value{
color:#e5e7eb;
}

.dark .priority-select{
background:#020617;
border-color:#334155;
color:#e5e7eb;
}

.menu{
width:220px;
background:#111;
color:white;
min-height:100vh;
}

.dark .menu{
background:#000;
}

.menu button{
width:100%;
text-align:left;
padding:10px;
border-radius:8px;
margin-bottom:6px;
}

.menu button:hover{
background:#222;
}

.hidden{display:none;}
</style>
</head>

<body id="body">

<div class="flex min-h-screen">

<!-- SIDEBAR -->
<div class="menu p-4">

<div class="flex items-center gap-3 mb-6">
<img src="assets/logo.png" width="40" alt="Logo">
<h2 class="text-lg font-semibold">Olá, Victor</h2>
</div>

<button onclick="show('openTasks')">📋 Tarefas em aberto</button>
<button onclick="show('history')">📅 Histórico</button>
<button onclick="show('dashboard')">📊 Dashboard</button>

<hr class="my-4">

<button onclick="toggleDark()">🌙 Modo Noturno</button>

</div>

<!-- CONTEÚDO -->
<main class="flex-1 p-6">

<!-- TAREFAS EM ABERTO -->
<section id="openTasks">

<h1 class="text-2xl font-bold mb-4">Tarefas em aberto</h1>

<div class="card">

<div class="grid grid-cols-1 lg:grid-cols-4 gap-2 mb-4">
<input id="taskInput" class="border p-2 text-black rounded" placeholder="Nova tarefa">
<input id="screenInput" class="border p-2 text-black rounded" placeholder="Tela">
<input id="commentInput" class="border p-2 text-black rounded" placeholder="Comentário">

<div class="flex gap-2">
<select id="priority" class="border p-2 text-black rounded w-full">
<option value="alta">Alta</option>
<option value="media">Média</option>
<option value="baixa">Baixa</option>
</select>

<button onclick="addTask()" class="bg-blue-500 text-white px-4 rounded">
Adicionar
</button>
</div>
</div>

<ul id="taskList"></ul>

</div>
</section>

<!-- HISTÓRICO -->
<section id="history" class="hidden">

<h1 class="text-2xl font-bold mb-4">Histórico</h1>

<div class="card">
<input type="date" id="historyDate" onchange="loadHistory()" class="border p-2 mb-4 text-black rounded">
<ul id="historyList"></ul>
</div>

</section>

<!-- DASHBOARD -->
<section id="dashboard" class="hidden">

<h1 class="text-2xl font-bold mb-4">Dashboard</h1>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

<div class="card text-center">
<p>Total</p>
<h2 id="kpiTotal">0</h2>
</div>

<div class="card text-center">
<p>Concluídas</p>
<h2 id="kpiDone" class="text-green-500">0</h2>
</div>

<div class="card text-center">
<p>Pendentes</p>
<h2 id="kpiPending" class="text-red-500">0</h2>
</div>

<div class="card text-center">
<p>Produtividade</p>
<h2 id="kpiRate">0%</h2>
</div>

</div>

</section>

</main>
</div>

<script>
/* ================= CONFIG ================= */

const openTasksKey="open_tasks";

const tarefasFixas=[
"Abertura Informe Diário",
"Fechamento Informe Diário"
];

/* ================= HELPERS ================= */

function localDate(){
const date=new Date();
const year=date.getFullYear();
const month=String(date.getMonth()+1).padStart(2,"0");
const day=String(date.getDate()).padStart(2,"0");
return `${year}-${month}-${day}`;
}

function formatDate(date){
if(!date)return "-";
const [year,month,day]=date.split("-");
return `${day}/${month}/${year}`;
}

function normalizeTask(task){
return {
title:task.title||"",
screen:task.screen||"",
comment:task.comment||task.note||"",
includedAt:task.includedAt||localDate(),
priority:task.priority||"media",
done:Boolean(task.done)
};
}

/* ================= MENU ================= */

function show(id){
document.querySelectorAll("#openTasks,#history,#dashboard")
.forEach(x=>x.classList.add("hidden"));

document.getElementById(id).classList.remove("hidden");

if(id==="dashboard")updateKPI();
}

/* ================= STORAGE ================= */

function getTasks(){
const tasks=JSON.parse(localStorage.getItem(openTasksKey))||[];
return tasks.map(normalizeTask);
}

function save(tasks){
localStorage.setItem(openTasksKey,JSON.stringify(tasks.map(normalizeTask)));
}

/* ================= CRIAR BASE ================= */

function criarBase(){
const tasks=getTasks();

if(tasks.length===0){
tarefasFixas.forEach(t=>{
tasks.push({
title:t,
screen:"Informe Diário",
comment:"",
includedAt:localDate(),
priority:"alta",
done:false
});
});

save(tasks);
}
}

/* ================= ADICIONAR ================= */

function addTask(){
const input=document.getElementById("taskInput");
const screen=document.getElementById("screenInput");
const comment=document.getElementById("commentInput");
const priority=document.getElementById("priority").value;

if(!input.value.trim())return;

const tasks=getTasks();

tasks.push({
title:input.value.trim(),
screen:screen.value.trim(),
comment:comment.value.trim(),
includedAt:localDate(),
priority,
done:false
});

save(tasks);
input.value="";
screen.value="";
comment.value="";
loadTasks();
}

/* ================= AÇÕES ================= */

function toggleDone(i){
const tasks=getTasks();
tasks[i].done=!tasks[i].done;
save(tasks);
loadTasks();
}

function editTask(i){
const tasks=getTasks();
const task=tasks[i];

const title=prompt("Editar tarefa:",task.title);
if(title===null)return;

const screen=prompt("Editar tela:",task.screen);
if(screen===null)return;

const comment=prompt("Editar comentário:",task.comment);
if(comment===null)return;

task.title=title.trim()||task.title;
task.screen=screen.trim();
task.comment=comment.trim();

save(tasks);
loadTasks();
}

function removeTask(i){
if(!confirm("Deseja excluir esta tarefa?"))return;

const tasks=getTasks();
tasks.splice(i,1);
save(tasks);
loadTasks();
}

function changePriority(i,value){
const tasks=getTasks();
tasks[i].priority=value;
save(tasks);
loadTasks();
}

/* ================= PRIORIDADE ================= */

function prioridadeIcon(p){
if(p==="alta")return "🔴";
if(p==="media")return "🟡";
return "🟢";
}

function prioridadeTexto(p){
if(p==="alta")return "Alta";
if(p==="media")return "Média";
return "Baixa";
}

/* ================= RENDER ================= */

function createField(label,value){
const wrapper=document.createElement("div");

const fieldLabel=document.createElement("p");
fieldLabel.className="task-label";
fieldLabel.textContent=label;

const fieldValue=document.createElement("p");
fieldValue.className="task-value break-words";
fieldValue.textContent=value||"-";

wrapper.appendChild(fieldLabel);
wrapper.appendChild(fieldValue);

return wrapper;
}

function render(tasks,target="taskList",readonly=false){
const ul=document.getElementById(target);
ul.innerHTML="";

tasks.forEach((task,i)=>{
const t=normalizeTask(task);

const li=document.createElement("li");
li.className="task-card";

const header=document.createElement("div");
header.className="flex flex-col md:flex-row md:items-start md:justify-between gap-3 mb-4";

const title=document.createElement("div");
const titleLabel=document.createElement("p");
titleLabel.className="task-label";
titleLabel.textContent="Tarefa";

const titleValue=document.createElement("h3");
titleValue.className=`text-lg font-semibold ${t.done?"line-through text-slate-500":"task-value"}`;
titleValue.textContent=`${prioridadeIcon(t.priority)} ${t.title}`;

title.appendChild(titleLabel);
title.appendChild(titleValue);

const actions=document.createElement("div");
actions.className="flex gap-2 flex-wrap";

if(!readonly){
const doneButton=document.createElement("button");
doneButton.className="bg-green-500 text-white px-3 py-2 rounded";
doneButton.title="Concluir tarefa";
doneButton.textContent=t.done?"Reabrir":"Concluir";
doneButton.onclick=()=>toggleDone(i);

const editButton=document.createElement("button");
editButton.className="bg-slate-600 text-white px-3 py-2 rounded";
editButton.title="Editar tarefa";
editButton.textContent="Editar";
editButton.onclick=()=>editTask(i);

const removeButton=document.createElement("button");
removeButton.className="bg-red-500 text-white px-3 py-2 rounded";
removeButton.title="Excluir tarefa";
removeButton.textContent="Excluir";
removeButton.onclick=()=>removeTask(i);

actions.appendChild(doneButton);
actions.appendChild(editButton);
actions.appendChild(removeButton);
}

header.appendChild(title);
header.appendChild(actions);
li.appendChild(header);

const grid=document.createElement("div");
grid.className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4";

grid.appendChild(createField("Tela",t.screen));
grid.appendChild(createField("Comentário",t.comment));
grid.appendChild(createField("Data de inclusão",formatDate(t.includedAt)));

const priorityField=document.createElement("div");
const priorityLabel=document.createElement("p");
priorityLabel.className="task-label";
priorityLabel.textContent="Prioridade";

if(readonly){
const priorityValue=document.createElement("p");
priorityValue.className="task-value";
priorityValue.textContent=prioridadeTexto(t.priority);
priorityField.appendChild(priorityLabel);
priorityField.appendChild(priorityValue);
}else{
const prioritySelect=document.createElement("select");
prioritySelect.className="priority-select mt-1";
prioritySelect.innerHTML=`
<option value="alta">Alta</option>
<option value="media">Média</option>
<option value="baixa">Baixa</option>
`;
prioritySelect.value=t.priority;
prioritySelect.onchange=e=>changePriority(i,e.target.value);
priorityField.appendChild(priorityLabel);
priorityField.appendChild(prioritySelect);
}

grid.appendChild(priorityField);
li.appendChild(grid);

ul.appendChild(li);
});
}

/* ================= LOAD ================= */

function loadTasks(){
render(getTasks());
}

function loadHistory(){
const date=document.getElementById("historyDate").value;
const data=JSON.parse(localStorage.getItem("history_"+date))||[];
render(data,"historyList",true);
}

/* ================= KPI ================= */

function updateKPI(){
const tasks=getTasks();
const total=tasks.length;
const done=tasks.filter(t=>t.done).length;

document.getElementById("kpiTotal").innerText=total;
document.getElementById("kpiDone").innerText=done;
document.getElementById("kpiPending").innerText=total-done;

const rate=total?Math.round(done/total*100):0;
document.getElementById("kpiRate").innerText=rate+"%";
}

/* ================= DARK ================= */

function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark_mode",document.body.classList.contains("dark"));
}

function loadTheme(){
if(localStorage.getItem("dark_mode")==="true"){
document.body.classList.add("dark");
}
}

/* START */
loadTheme();
criarBase();
loadTasks();
</script>

</body>
</html>
