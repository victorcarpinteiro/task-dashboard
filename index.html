<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Dashboard</title>
<link rel="icon" href="assets/logo.png" type="image/png">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#f1f5f9;
transition:.3s;
}

body.dark{
background:#000;
color:#e5e7eb;
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.task-card{
background:#f8fafc;
border:1px solid #e2e8f0;
border-radius:12px;
padding:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
cursor:grab;
}

.task-card:hover{
box-shadow:0 4px 12px rgba(0,0,0,.12);
}

.task-card.dragging{
opacity:.55;
cursor:grabbing;
}

.task-card.drag-over{
border-color:#3b82f6;
box-shadow:0 0 0 3px rgba(59,130,246,.18),0 4px 12px rgba(0,0,0,.12);
}

.history-line{
display:grid;
grid-template-columns:40px 1.5fr 1.8fr .8fr .9fr .9fr;
gap:12px;
align-items:center;
padding:12px;
border-bottom:1px solid #e2e8f0;
}

.history-header{
display:grid;
grid-template-columns:40px 1.5fr 1.8fr .8fr .9fr .9fr;
gap:12px;
padding:0 12px 8px;
}

.history-header span{
color:#64748b;
font-size:.75rem;
font-weight:700;
letter-spacing:.04em;
text-transform:uppercase;
}

.history-line:first-child{
border-top:1px solid #e2e8f0;
}

.history-line span{
font-size:.9rem;
color:#0f172a;
word-break:break-word;
}

.history-line .history-label{
display:none;
}

.task-label{
color:#64748b;
font-size:.75rem;
font-weight:700;
letter-spacing:.04em;
text-transform:uppercase;
}

.task-value{
color:#0f172a;
font-size:.95rem;
}

.priority-select{
border:1px solid #cbd5e1;
border-radius:8px;
padding:6px 8px;
color:#0f172a;
background:white;
}

.comment-box{
min-height:72px;
resize:vertical;
border:1px solid #cbd5e1;
border-radius:8px;
padding:8px;
color:#0f172a;
background:white;
}

#taskList{
display:grid;
grid-template-columns:repeat(1,minmax(0,1fr));
gap:12px;
}

.dark .card{
background:#111;
box-shadow:0 4px 20px rgba(0,0,0,.6);
}

.dark .task-card{
background:#111827;
border-color:#1f2937;
}

.dark .history-line{
border-color:#1f2937;
}

.dark .history-line span{
color:#e5e7eb;
}

.dark .history-header span{
color:#94a3b8;
}

.dark .task-label{
color:#94a3b8;
}

.dark .task-value{
color:#e5e7eb;
}

.dark .priority-select{
background:#020617;
border-color:#334155;
color:#e5e7eb;
}

.dark .comment-box{
background:#020617;
border-color:#334155;
color:#e5e7eb;
}

.menu{
width:220px;
background:#111;
color:white;
min-height:100vh;
}

.dark .menu{
background:#000;
}

.menu button{
width:100%;
text-align:left;
padding:10px;
border-radius:8px;
margin-bottom:6px;
}

.menu button:hover{
background:#222;
}

.hidden{display:none;}

@media(min-width:900px){
#taskList{
grid-template-columns:repeat(2,minmax(0,1fr));
}
}

@media(min-width:1280px){
#taskList{
grid-template-columns:repeat(3,minmax(0,1fr));
}
}

@media(max-width:900px){
.history-line{
grid-template-columns:1fr;
gap:4px;
border:1px solid #e2e8f0;
border-radius:12px;
margin-bottom:10px;
}

.history-line:first-child{
border-top:1px solid #e2e8f0;
}

.history-line .history-label{
display:block;
color:#64748b;
font-size:.72rem;
font-weight:700;
letter-spacing:.04em;
text-transform:uppercase;
}

.history-header{
display:none;
}
}
</style>
</head>

<body id="body">

<div class="flex min-h-screen">

<!-- SIDEBAR -->
<div class="menu p-4">

<div class="flex items-center gap-3 mb-6">
<img src="assets/logo.png" width="40" alt="Logo">
<h2 class="text-lg font-semibold">Olá, Victor</h2>
</div>

<button onclick="show('openTasks')">📋 Tarefas em aberto</button>
<button onclick="show('history')">📅 Histórico</button>
<button onclick="show('dashboard')">📊 Dashboard</button>

<hr class="my-4">

<button onclick="toggleDark()">🌙 Modo Noturno</button>

</div>

<!-- CONTEÚDO -->
<main class="flex-1 p-6">

<!-- TAREFAS EM ABERTO -->
<section id="openTasks">

<h1 class="text-2xl font-bold mb-4">Tarefas em aberto</h1>

<div class="card">

<div class="grid grid-cols-1 lg:grid-cols-3 gap-2 mb-4">
<input id="taskInput" class="border p-2 text-black rounded" placeholder="Nova tarefa">
<input id="commentInput" class="border p-2 text-black rounded" placeholder="Comentário">

<div class="flex gap-2">
<select id="priority" class="border p-2 text-black rounded w-full">
<option value="alta">Alta</option>
<option value="media">Média</option>
<option value="baixa">Baixa</option>
</select>

<button onclick="addTask()" class="bg-blue-500 text-white px-4 rounded">
Adicionar
</button>
</div>
</div>

<ul id="taskList"></ul>

</div>
</section>

<!-- HISTÓRICO -->
<section id="history" class="hidden">

<h1 class="text-2xl font-bold mb-4">Histórico</h1>

<div class="card">
<button onclick="recoverSelectedHistory()" class="bg-blue-500 text-white px-4 py-2 rounded mb-4">
Recuperar
</button>
<div id="historyList"></div>
</div>

</section>

<!-- DASHBOARD -->
<section id="dashboard" class="hidden">

<h1 class="text-2xl font-bold mb-4">Dashboard</h1>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

<div class="card text-center">
<p>Total</p>
<h2 id="kpiTotal">0</h2>
</div>

<div class="card text-center">
<p>Concluídas</p>
<h2 id="kpiDone" class="text-green-500">0</h2>
</div>

<div class="card text-center">
<p>Pendentes</p>
<h2 id="kpiPending" class="text-red-500">0</h2>
</div>

<div class="card text-center">
<p>Produtividade</p>
<h2 id="kpiRate">0%</h2>
</div>

</div>

</section>

</main>
</div>

<script>
/* ================= CONFIG ================= */

const openTasksKey="open_tasks";
const selectedHistory=new Set();

const tarefasFixas=[
"Abertura Informe Diário",
"Fechamento Informe Diário"
];

/* ================= HELPERS ================= */

function localDate(){
const date=new Date();
const year=date.getFullYear();
const month=String(date.getMonth()+1).padStart(2,"0");
const day=String(date.getDate()).padStart(2,"0");
return `${year}-${month}-${day}`;
}

function formatDate(date){
if(!date)return "-";
const [year,month,day]=date.split("-");
return `${day}/${month}/${year}`;
}

function normalizeTask(task){
return {
title:task.title||"",
comment:task.comment||task.note||"",
includedAt:task.includedAt||localDate(),
closedAt:task.closedAt||"",
priority:task.priority||"media",
done:Boolean(task.done)
};
}

function getHistoryKey(date){
return "history_"+date;
}

/* ================= MENU ================= */

function show(id){
document.querySelectorAll("#openTasks,#history,#dashboard")
.forEach(x=>x.classList.add("hidden"));

document.getElementById(id).classList.remove("hidden");

if(id==="history")loadHistory();
if(id==="dashboard")updateKPI();
}

/* ================= STORAGE ================= */

function getTasks(){
const tasks=JSON.parse(localStorage.getItem(openTasksKey))||[];
return tasks.map(normalizeTask);
}

function save(tasks){
localStorage.setItem(openTasksKey,JSON.stringify(tasks.map(normalizeTask)));
}

function getHistory(date){
const tasks=JSON.parse(localStorage.getItem(getHistoryKey(date)))||[];
return tasks.map(normalizeTask);
}

function saveHistory(tasks,date){
localStorage.setItem(getHistoryKey(date),JSON.stringify(tasks.map(normalizeTask)));
}

function getAllHistoryTasks(){
let history=[];

for(let i=0;i<localStorage.length;i++){
const key=localStorage.key(i);
if(key && key.startsWith("history_")){
const tasks=JSON.parse(localStorage.getItem(key))||[];
history=history.concat(tasks.map(normalizeTask));
}
}

return history;
}

function getAllHistoryEntries(){
let history=[];

for(let i=0;i<localStorage.length;i++){
const key=localStorage.key(i);
if(key && key.startsWith("history_")){
const tasks=JSON.parse(localStorage.getItem(key))||[];
tasks.forEach((task,index)=>{
history.push({
key,
index,
id:`${key}:${index}`,
task:normalizeTask(task)
});
});
}
}

return history;
}

/* ================= CRIAR BASE ================= */

function criarBase(){
const tasks=getTasks();

if(tasks.length===0){
tarefasFixas.forEach(t=>{
tasks.push({
title:t,
comment:"",
includedAt:localDate(),
priority:"alta",
done:false
});
});

save(tasks);
}
}

/* ================= ADICIONAR ================= */

function addTask(){
const input=document.getElementById("taskInput");
const comment=document.getElementById("commentInput");
const priority=document.getElementById("priority").value;

if(!input.value.trim())return;

const tasks=getTasks();

tasks.push({
title:input.value.trim(),
comment:comment.value.trim(),
includedAt:localDate(),
priority,
done:false
});

save(tasks);
input.value="";
comment.value="";
loadTasks();
}

/* ================= AÇÕES ================= */

function finishTask(i){
const tasks=getTasks();
const closedAt=localDate();
const finishedTask={
...tasks[i],
done:true,
closedAt
};

tasks.splice(i,1);
save(tasks);

const history=getHistory(closedAt);
history.push(finishedTask);
saveHistory(history,closedAt);

loadTasks();
}

function editTask(i){
const tasks=getTasks();
const task=tasks[i];

const title=prompt("Editar tarefa:",task.title);
if(title===null)return;

task.title=title.trim()||task.title;

save(tasks);
loadTasks();
}

function removeTask(i){
if(!confirm("Deseja excluir esta tarefa?"))return;

const tasks=getTasks();
tasks.splice(i,1);
save(tasks);
loadTasks();
}

function changePriority(i,value){
const tasks=getTasks();
tasks[i].priority=value;
save(tasks);
loadTasks();
}

function saveComment(i,value){
const tasks=getTasks();
tasks[i].comment=value;
save(tasks);
}

function moveTask(fromIndex,toIndex){
if(fromIndex===toIndex || fromIndex<0 || toIndex<0)return;

const tasks=getTasks();
if(fromIndex>=tasks.length || toIndex>=tasks.length)return;

const [task]=tasks.splice(fromIndex,1);
tasks.splice(toIndex,0,task);
save(tasks);
loadTasks();
}

function isInteractiveElement(element){
return Boolean(element.closest("button,input,select,textarea,label"));
}

function recoverSelectedHistory(){
if(selectedHistory.size===0){
alert("Selecione uma tarefa concluída para recuperar.");
return;
}

const entries=getAllHistoryEntries()
.filter(entry=>selectedHistory.has(entry.id));

if(entries.length===0)return;

const openTasks=getTasks();

entries.forEach(entry=>{
openTasks.push({
...entry.task,
done:false,
closedAt:""
});
});

save(openTasks);

const byKey={};
entries.forEach(entry=>{
if(!byKey[entry.key])byKey[entry.key]=[];
byKey[entry.key].push(entry.index);
});

Object.keys(byKey).forEach(key=>{
const tasks=JSON.parse(localStorage.getItem(key))||[];
byKey[key]
.sort((a,b)=>b-a)
.forEach(index=>tasks.splice(index,1));
localStorage.setItem(key,JSON.stringify(tasks));
});

selectedHistory.clear();
loadTasks();
loadHistory();
}

/* ================= PRIORIDADE ================= */

function prioridadeIcon(p){
if(p==="alta")return "🔴";
if(p==="media")return "🟡";
return "🟢";
}

function prioridadeTexto(p){
if(p==="alta")return "Alta";
if(p==="media")return "Média";
return "Baixa";
}

/* ================= RENDER ================= */

function createField(label,value){
const wrapper=document.createElement("div");

const fieldLabel=document.createElement("p");
fieldLabel.className="task-label";
fieldLabel.textContent=label;

const fieldValue=document.createElement("p");
fieldValue.className="task-value break-words";
fieldValue.textContent=value||"-";

wrapper.appendChild(fieldLabel);
wrapper.appendChild(fieldValue);

return wrapper;
}

function render(tasks,target="taskList",readonly=false){
const ul=document.getElementById(target);
ul.innerHTML="";

if(!readonly && target==="taskList"){
ul.ondragover=e=>{
e.preventDefault();
};

ul.ondrop=e=>{
e.preventDefault();
const draggedIndex=Number(e.dataTransfer.getData("text/plain"));
const droppedOnCard=e.target.closest(".task-card");
if(!droppedOnCard && tasks.length>0){
moveTask(draggedIndex,tasks.length-1);
}
};
}

tasks.forEach((task,i)=>{
const t=normalizeTask(task);

const li=document.createElement("li");
li.className="task-card";

if(!readonly && target==="taskList"){
li.draggable=true;
li.dataset.index=i;
li.title="Arraste para reposicionar";

li.ondragstart=e=>{
if(isInteractiveElement(e.target)){
e.preventDefault();
return;
}
li.classList.add("dragging");
e.dataTransfer.effectAllowed="move";
e.dataTransfer.setData("text/plain",String(i));
};

li.ondragend=()=>{
li.classList.remove("dragging");
document.querySelectorAll(".task-card.drag-over")
.forEach(card=>card.classList.remove("drag-over"));
};

li.ondragover=e=>{
e.preventDefault();
const draggedIndex=Number(e.dataTransfer.getData("text/plain"));
if(draggedIndex!==i){
li.classList.add("drag-over");
}
};

li.ondragleave=()=>{
li.classList.remove("drag-over");
};

li.ondrop=e=>{
e.preventDefault();
e.stopPropagation();
li.classList.remove("drag-over");
const draggedIndex=Number(e.dataTransfer.getData("text/plain"));
moveTask(draggedIndex,i);
};
}

const header=document.createElement("div");
header.className="flex flex-col gap-3 mb-3";

const title=document.createElement("div");
const titleLabel=document.createElement("p");
titleLabel.className="task-label";
titleLabel.textContent="Tarefa";

const titleValue=document.createElement("h3");
titleValue.className=`text-base font-semibold break-words ${t.done?"line-through text-slate-500":"task-value"}`;
titleValue.textContent=`${prioridadeIcon(t.priority)} ${t.title}`;

title.appendChild(titleLabel);
title.appendChild(titleValue);

const actions=document.createElement("div");
actions.className="flex gap-2 flex-wrap";

if(!readonly){
const doneButton=document.createElement("button");
doneButton.className="bg-green-500 text-white px-3 py-1.5 rounded text-sm";
doneButton.title="Finalizar tarefa";
doneButton.textContent="Finalizar";
doneButton.onclick=()=>finishTask(i);

const editButton=document.createElement("button");
editButton.className="bg-slate-600 text-white px-3 py-1.5 rounded text-sm";
editButton.title="Editar tarefa";
editButton.textContent="Editar";
editButton.onclick=()=>editTask(i);

const removeButton=document.createElement("button");
removeButton.className="bg-red-500 text-white px-3 py-1.5 rounded text-sm";
removeButton.title="Excluir tarefa";
removeButton.textContent="Excluir";
removeButton.onclick=()=>removeTask(i);

actions.appendChild(doneButton);
actions.appendChild(editButton);
actions.appendChild(removeButton);
}

header.appendChild(title);
header.appendChild(actions);
li.appendChild(header);

const grid=document.createElement("div");
grid.className="grid grid-cols-1 sm:grid-cols-3 gap-3";

grid.appendChild(createField("Data de inclusão",formatDate(t.includedAt)));

const priorityField=document.createElement("div");
const priorityLabel=document.createElement("p");
priorityLabel.className="task-label";
priorityLabel.textContent="Prioridade";

if(readonly){
const priorityValue=document.createElement("p");
priorityValue.className="task-value";
priorityValue.textContent=prioridadeTexto(t.priority);
priorityField.appendChild(priorityLabel);
priorityField.appendChild(priorityValue);
}else{
const prioritySelect=document.createElement("select");
prioritySelect.className="priority-select mt-1";
prioritySelect.innerHTML=`
<option value="alta">Alta</option>
<option value="media">Média</option>
<option value="baixa">Baixa</option>
`;
prioritySelect.value=t.priority;
prioritySelect.onchange=e=>changePriority(i,e.target.value);
priorityField.appendChild(priorityLabel);
priorityField.appendChild(prioritySelect);
}

grid.appendChild(priorityField);
grid.appendChild(createField("Status",t.done?"Finalizada":"Em aberto"));
li.appendChild(grid);

if(!readonly){
const commentWrapper=document.createElement("div");
commentWrapper.className="mt-4";

const commentLabel=document.createElement("p");
commentLabel.className="task-label mb-1";
commentLabel.textContent="Comentário";

const commentTextarea=document.createElement("textarea");
commentTextarea.className="comment-box w-full";
commentTextarea.placeholder="Adicionar comentário";
commentTextarea.value=t.comment||"";
commentTextarea.oninput=e=>saveComment(i,e.target.value);

commentWrapper.appendChild(commentLabel);
commentWrapper.appendChild(commentTextarea);
li.appendChild(commentWrapper);
}

ul.appendChild(li);
});
}

/* ================= LOAD ================= */

function loadTasks(){
render(getTasks());
}

function loadHistory(){
const data=getAllHistoryEntries();
renderHistory(data);
}

function createHistoryCell(label,value){
const wrapper=document.createElement("div");

const cellLabel=document.createElement("span");
cellLabel.className="history-label";
cellLabel.textContent=label;

const cellValue=document.createElement("span");
cellValue.textContent=value||"-";

wrapper.appendChild(cellLabel);
wrapper.appendChild(cellValue);

return wrapper;
}

function renderHistory(entries){
const list=document.getElementById("historyList");
list.innerHTML="";

if(entries.length===0){
const empty=document.createElement("p");
empty.className="text-slate-500";
empty.textContent="Nenhuma tarefa finalizada.";
list.appendChild(empty);
return;
}

const header=document.createElement("div");
header.className="history-header";

["","Tarefa","Comentário","Prioridade","Inclusão","Encerramento"].forEach(label=>{
const span=document.createElement("span");
span.textContent=label;
header.appendChild(span);
});

list.appendChild(header);

entries.forEach(entry=>{
const task=normalizeTask(entry.task);
const line=document.createElement("div");
line.className="history-line";

const checkboxWrapper=document.createElement("div");
const checkbox=document.createElement("input");
checkbox.type="checkbox";
checkbox.title="Selecionar tarefa concluída";
checkbox.checked=selectedHistory.has(entry.id);
checkbox.onchange=e=>{
if(e.target.checked){
selectedHistory.add(entry.id);
}else{
selectedHistory.delete(entry.id);
}
};
checkboxWrapper.appendChild(checkbox);

line.appendChild(checkboxWrapper);
line.appendChild(createHistoryCell("Tarefa",`${prioridadeIcon(task.priority)} ${task.title}`));
line.appendChild(createHistoryCell("Comentário",task.comment));
line.appendChild(createHistoryCell("Prioridade",prioridadeTexto(task.priority)));
line.appendChild(createHistoryCell("Inclusão",formatDate(task.includedAt)));
line.appendChild(createHistoryCell("Encerramento",formatDate(task.closedAt)));

list.appendChild(line);
});
}

/* ================= KPI ================= */

function updateKPI(){
const tasks=getTasks();
const history=getAllHistoryTasks();
const total=tasks.length+history.length;
const done=history.length;

document.getElementById("kpiTotal").innerText=total;
document.getElementById("kpiDone").innerText=done;
document.getElementById("kpiPending").innerText=tasks.length;

const rate=total?Math.round(done/total*100):0;
document.getElementById("kpiRate").innerText=rate+"%";
}

/* ================= DARK ================= */

function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark_mode",document.body.classList.contains("dark"));
}

function loadTheme(){
if(localStorage.getItem("dark_mode")==="true"){
document.body.classList.add("dark");
}
}

/* START */
loadTheme();
criarBase();
loadTasks();
</script>

</body>
</html>
