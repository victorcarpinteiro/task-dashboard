<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard de Tarefas</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.dark {
 background:#111827;
 color:white;
}
.card{
 border-radius:12px;
 box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
</style>

</head>

<body id="body" class="bg-gray-100 p-6 transition-all">

<div class="max-w-4xl mx-auto">

<div class="flex justify-between mb-4">
<h1 class="text-2xl font-bold">📊 Controle Diário</h1>

<button onclick="toggleDark()" class="bg-black text-white px-3 py-1 rounded">
🌙 Modo Noturno
</button>
</div>

<!-- KPI -->
<div class="grid grid-cols-4 gap-3 mb-6">

<div class="card bg-white p-3 text-center">
<p>Total</p>
<h2 id="kpiTotal" class="text-xl font-bold">0</h2>
</div>

<div class="card bg-white p-3 text-center">
<p>Concluídas</p>
<h2 id="kpiDone" class="text-xl font-bold text-green-600">0</h2>
</div>

<div class="card bg-white p-3 text-center">
<p>Pendentes</p>
<h2 id="kpiPending" class="text-xl font-bold text-red-600">0</h2>
</div>

<div class="card bg-white p-3 text-center">
<p>Produtividade</p>
<h2 id="kpiRate" class="text-xl font-bold">0%</h2>
</div>

</div>

<!-- QUADRO -->
<div class="card bg-white p-5">

<div class="flex gap-2 mb-4">
<input id="taskInput" class="border p-2 w-full" placeholder="Nova tarefa">

<select id="priority" class="border p-2">
<option value="alta">Alta</option>
<option value="media">Média</option>
<option value="baixa">Baixa</option>
</select>

<button onclick="addTask()" class="bg-blue-500 text-white px-4 rounded">
Adicionar
</button>
</div>

<ul id="taskList"></ul>

</div>

</div>

<script>

const today = new Date().toISOString().split('T')[0];

function getTasks(date=today){
 return JSON.parse(localStorage.getItem(date)) || [];
}

function save(tasks,date=today){
 localStorage.setItem(date,JSON.stringify(tasks));
}

function addTask(){

 const input=document.getElementById("taskInput");
 const priority=document.getElementById("priority").value;

 if(!input.value) return;

 const tasks=getTasks();

 tasks.push({
  title:input.value,
  priority,
  done:false
 });

 save(tasks);
 input.value="";
 loadTasks();
}

function toggle(i){
 const tasks=getTasks();
 tasks[i].done=!tasks[i].done;
 save(tasks);
 loadTasks();
}

function removeTask(i){
 const tasks=getTasks();
 tasks.splice(i,1);
 save(tasks);
 loadTasks();
}

function editTask(i){
 const tasks=getTasks();
 const novo=prompt("Editar tarefa:",tasks[i].title);
 if(!novo) return;
 tasks[i].title=novo;
 save(tasks);
 loadTasks();
}

function render(tasks){

 const ul=document.getElementById("taskList");
 ul.innerHTML="";

 tasks.forEach((t,i)=>{

 const color=
 t.priority==="alta"?"text-red-600":
 t.priority==="media"?"text-yellow-600":
 "text-green-600";

 ul.innerHTML+=`
 <li class="flex justify-between items-center border-b py-2">

 <span class="${color} ${t.done?'line-through':''}">
 ${t.title}
 </span>

 <div class="flex gap-2">
 <button onclick="toggle(${i})">✅</button>
 <button onclick="editTask(${i})">✏️</button>
 <button onclick="removeTask(${i})">🗑️</button>
 </div>

 </li>`;
 });

updateKPI();
}

function updateKPI(){

 let total=0;
 let done=0;

 for(let i=0;i<5;i++){

 const d=new Date();
 d.setDate(d.getDate()-i);

 const key=d.toISOString().split('T')[0];
 const tasks=getTasks(key);

 total+=tasks.length;
 done+=tasks.filter(t=>t.done).length;
 }

document.getElementById("kpiTotal").innerText=total;
document.getElementById("kpiDone").innerText=done;
document.getElementById("kpiPending").innerText=total-done;

const rate=total?Math.round((done/total)*100):0;
document.getElementById("kpiRate").innerText=rate+"%";
}

function toggleDark(){
 document.getElementById("body").classList.toggle("dark");
}

function loadTasks(){
 render(getTasks());
}

loadTasks();

</script>

</body>
</html>
