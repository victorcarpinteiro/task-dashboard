<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Task Dashboard</title>
<link rel="icon" href="assets/logo.png" type="image/png">

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f1f5f9;
transition:.3s;
}

body.dark{
background:#000;
color:#e5e7eb;
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.dark .card{
background:#111;
box-shadow:0 4px 20px rgba(0,0,0,.6);
}

.menu{
width:220px;
background:#111;
color:white;
min-height:100vh;
}

.dark .menu{
background:#000;
}

.menu button{
width:100%;
text-align:left;
padding:10px;
border-radius:8px;
margin-bottom:6px;
}

.menu button:hover{
background:#222;
}

.hidden{display:none;}

</style>
</head>

<body id="body">

<div class="flex">

<!-- SIDEBAR -->
<div class="menu p-4">

<div class="flex items-center gap-3 mb-6">
<img src="assets/logo.png" width="40">
<h2 class="text-lg font-semibold">Olá, Victor</h2>
</div>

<button onclick="show('today')">📋 Tarefas Hoje</button>
<button onclick="show('history')">📅 Histórico</button>
<button onclick="show('dashboard')">📊 Dashboard</button>

<hr class="my-4">

<button onclick="toggleDark()">🌙 Modo Noturno</button>

</div>

<!-- CONTEÚDO -->
<div class="flex-1 p-6">

<!-- HOJE -->
<div id="today">

<h1 class="text-2xl font-bold mb-4">Tarefas de Hoje</h1>

<div class="card">

<div class="flex gap-2 mb-4">
<input id="taskInput" class="border p-2 w-full text-black" placeholder="Nova tarefa">

<select id="priority" class="border p-2 text-black">
<option value="alta">Alta</option>
<option value="media">Média</option>
<option value="baixa">Baixa</option>
</select>

<button onclick="addTask()" class="bg-blue-500 text-white px-4 rounded">
Adicionar
</button>
</div>

<button onclick="fecharDia()" 
class="bg-red-500 text-white px-4 py-2 rounded mb-4">
Fechar Dia
</button>

<ul id="taskList"></ul>

</div>
</div>

<!-- HISTÓRICO -->
<div id="history" class="hidden">

<h1 class="text-2xl font-bold mb-4">Histórico</h1>

<div class="card">
<input type="date" id="historyDate" onchange="loadHistory()" class="border p-2 mb-4 text-black">
<ul id="historyList"></ul>
</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<h1 class="text-2xl font-bold mb-4">Dashboard</h1>

<div class="grid grid-cols-4 gap-4">

<div class="card text-center">
<p>Total</p>
<h2 id="kpiTotal">0</h2>
</div>

<div class="card text-center">
<p>Concluídas</p>
<h2 id="kpiDone" class="text-green-500">0</h2>
</div>

<div class="card text-center">
<p>Pendentes</p>
<h2 id="kpiPending" class="text-red-500">0</h2>
</div>

<div class="card text-center">
<p>Produtividade</p>
<h2 id="kpiRate">0%</h2>
</div>

</div>

</div>

</div>
</div>

<script>

/* ================= CONFIG ================= */

const today=new Date().toISOString().split('T')[0];

const tarefasFixas=[
"Abertura Informe Diário",
"Fechamento Informe Diário"
];

/* ================= MENU ================= */

function show(id){
document.querySelectorAll("#today,#history,#dashboard")
.forEach(x=>x.classList.add("hidden"));

document.getElementById(id).classList.remove("hidden");

if(id==="dashboard")updateKPI();
}

/* ================= STORAGE ================= */

function getTasks(date=today){
return JSON.parse(localStorage.getItem(date))||[];
}

function save(tasks,date=today){
localStorage.setItem(date,JSON.stringify(tasks));
}

/* ================= CRIAR DIA ================= */

function criarDia(){

let tasks=getTasks();

if(tasks.length===0){

tarefasFixas.forEach(t=>{
tasks.push({
title:t,
priority:"alta",
done:false
});
});

save(tasks);
}
}

/* ================= ADICIONAR ================= */

function addTask(){

const input=document.getElementById("taskInput");
const priority=document.getElementById("priority").value;

if(!input.value)return;

const tasks=getTasks();

tasks.push({
title:input.value,
priority,
done:false
});

save(tasks);
input.value="";
loadTasks();
}

/* ================= CHECK ================= */

function toggle(i){
const tasks=getTasks();
tasks[i].done=!tasks[i].done;
save(tasks);
loadTasks();
}

/* ================= EDITAR ================= */

function editTask(i){
const tasks=getTasks();
const novo=prompt("Editar tarefa:",tasks[i].title);
if(!novo)return;
tasks[i].title=novo;
save(tasks);
loadTasks();
}

/* ================= EXCLUIR ================= */

function removeTask(i){
const tasks=getTasks();
tasks.splice(i,1);
save(tasks);
loadTasks();
}

/* ================= PRIORIDADE ICON ================= */

function prioridadeIcon(p){
if(p==="alta")return "🔴";
if(p==="media")return "🟡";
return "🟢";
}

/* ================= DRAG DROP ================= */

let dragIndex=null;

function render(tasks,target="taskList"){

const ul=document.getElementById(target);
ul.innerHTML="";

tasks.forEach((t,i)=>{

const li=document.createElement("li");
li.className="flex justify-between border-b py-2";
li.draggable=true;

li.innerHTML=`
<span class="${t.done?'line-through':''}">
${prioridadeIcon(t.priority)} ${t.title}
</span>

<div class="flex gap-2">
<button onclick="toggle(${i})">✅</button>
<button onclick="editTask(${i})">✏️</button>
<button onclick="removeTask(${i})">🗑️</button>
</div>
`;

li.addEventListener("dragstart",()=>dragIndex=i);
li.addEventListener("dragover",e=>e.preventDefault());
li.addEventListener("drop",()=>trocar(i));

ul.appendChild(li);
});
}

function trocar(i){

const tasks=getTasks();

const item=tasks.splice(dragIndex,1)[0];
tasks.splice(i,0,item);

save(tasks);
loadTasks();
}

/* ================= LOAD ================= */

function loadTasks(){
render(getTasks());
}

function loadHistory(){

const date=document.getElementById("historyDate").value;

const data=
JSON.parse(localStorage.getItem("history_"+date))||[];

render(data,"historyList");
}

/* ================= FECHAR DIA ================= */

function fecharDia(){

const hojeKey=today;
const tasksHoje=getTasks(hojeKey);

/* salvar histórico */
localStorage.setItem(
"history_"+hojeKey,
JSON.stringify(tasksHoje)
);

/* pendentes */
const pendentes=tasksHoje.filter(t=>!t.done);

/* criar amanhã */
const amanha=new Date();
amanha.setDate(amanha.getDate()+1);

const keyAmanha=amanha.toISOString().split('T')[0];

let tarefasAmanha=[];

/* tarefas fixas alta prioridade */
tarefasFixas.forEach(t=>{
tarefasAmanha.push({
title:t,
priority:"alta",
done:false
});
});

/* mover pendências */
pendentes.forEach(t=>{
tarefasAmanha.push({
title:t.title,
priority:t.priority,
done:false
});
});

save(tarefasAmanha,keyAmanha);

/* limpar hoje */
localStorage.removeItem(hojeKey);

alert("✅ Dia fechado com sucesso!");

location.reload();
}

/* ================= KPI ================= */

function updateKPI(){

let total=0;
let done=0;

for(let i=0;i<5;i++){

const d=new Date();
d.setDate(d.getDate()-i);

const key="history_"+d.toISOString().split('T')[0];

const tasks=
JSON.parse(localStorage.getItem(key))||[];

total+=tasks.length;
done+=tasks.filter(t=>t.done).length;
}

document.getElementById("kpiTotal").innerText=total;
document.getElementById("kpiDone").innerText=done;
document.getElementById("kpiPending").innerText=total-done;

const rate=total?Math.round(done/total*100):0;
document.getElementById("kpiRate").innerText=rate+"%";
}

/* ================= DARK ================= */

function toggleDark(){
document.body.classList.toggle("dark");
}

/* START */
criarDia();
loadTasks();

</script>

</body>
</html>
