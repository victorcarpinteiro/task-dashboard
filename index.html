<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Task Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            <img src="logo.png" width="40">
            <h2>Olá, Victor</h2>
        </div>

        <button onclick="mostrarPagina('hoje')">📋 Tarefas de Hoje</button>
        <button onclick="mostrarPagina('historico')">📅 Histórico</button>
        <button onclick="mostrarPagina('dashboard')">📊 Dashboard</button>

        <hr>

        <button onclick="toggleDark()">🌙 Modo Noturno</button>
        <button onclick="ativarModoInteligente()">🧠 Modo Inteligente</button>

    </aside>

    <!-- CONTEUDO -->
    <main>

        <!-- HOJE -->
        <section id="hoje" class="pagina">
            <h1>Tarefas de Hoje</h1>

            <input id="novaTarefa" placeholder="Digite uma tarefa">
            <button onclick="adicionarTarefa()">Adicionar</button>

            <div id="lista"></div>
        </section>

        <!-- HISTORICO -->
        <section id="historico" class="pagina hidden">
            <h1>Histórico</h1>
            <div id="historicoLista"></div>
        </section>

        <!-- DASHBOARD -->
        <section id="dashboard" class="pagina hidden">
            <h1>Dashboard</h1>

            <div class="kpis">
                <div class="card" id="kpiTotal"></div>
                <div class="card" id="kpiConcluidas"></div>
                <div class="card" id="kpiProd"></div>
            </div>

            <div id="kpi" class="card"></div>

        </section>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
