<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Dashboard</title>
<link rel="icon" href="assets/logo.png" type="image/png">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:#f1f5f9;
transition:.3s;
}

body.dark{
background:#000;
color:#e5e7eb;
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.task-card{
background:#f8fafc;
border:1px solid #e2e8f0;
border-radius:12px;
padding:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
cursor:grab;
}

.task-card:hover{
box-shadow:0 4px 12px rgba(0,0,0,.12);
}

.task-card.dragging{
opacity:.55;
cursor:grabbing;
}

.task-card.drag-over{
border-color:#3b82f6;
box-shadow:0 0 0 3px rgba(59,130,246,.18),0 4px 12px rgba(0,0,0,.12);
}

.history-line{
display:grid;
grid-template-columns:40px 1.4fr 1fr 1.6fr .8fr .9fr .9fr;
gap:12px;
align-items:center;
padding:12px;
border-bottom:1px solid #e2e8f0;
}

.history-header{
display:grid;
grid-template-columns:40px 1.4fr 1fr 1.6fr .8fr .9fr .9fr;
gap:12px;
padding:0 12px 8px;
}

.history-header span{
color:#64748b;
font-size:.75rem;
font-weight:700;
letter-spacing:.04em;
text-transform:uppercase;
}

.history-sort-button{
background:transparent;
border:0;
color:#64748b;
cursor:pointer;
font-size:.75rem;
font-weight:700;
letter-spacing:.04em;
padding:0;
text-transform:uppercase;
text-align:left;
width:100%;
}

.history-sort-button:hover{
color:#0f172a;
}

.history-line:first-child{
border-top:1px solid #e2e8f0;
}

.history-line span{
font-size:.9rem;
color:#0f172a;
word-break:break-word;
}

.history-line .history-label{
display:none;
}

.task-label{
color:#64748b;
font-size:.75rem;
font-weight:700;
letter-spacing:.04em;
text-transform:uppercase;
}

.task-value{
color:#0f172a;
font-size:.95rem;
}

.priority-select{
border:1px solid #cbd5e1;
border-radius:8px;
padding:6px 8px;
color:#0f172a;
background:white;
}

.comment-box{
min-height:72px;
resize:vertical;
border:1px solid #cbd5e1;
border-radius:8px;
padding:8px;
color:#0f172a;
background:white;
}

#taskList{
display:grid;
grid-template-columns:repeat(1,minmax(0,1fr));
gap:12px;
}

.dark .card{
background:#111;
box-shadow:0 4px 20px rgba(0,0,0,.6);
}

.dark .task-card{
background:#111827;
border-color:#1f2937;
}

.dark .history-line{
border-color:#1f2937;
}

.dark .history-line span{
color:#e5e7eb;
}

.dark .history-header span{
color:#94a3b8;
}

.dark .history-sort-button{
color:#94a3b8;
}

.dark .history-sort-button:hover{
color:#e5e7eb;
}

.dark .task-label{
color:#94a3b8;
}

.dark .task-value{
color:#e5e7eb;
}

.dark .priority-select{
background:#020617;
border-color:#334155;
color:#e5e7eb;
}

.dark .comment-box{
background:#020617;
border-color:#334155;
color:#e5e7eb;
}

.menu{
width:220px;
background:#111;
color:white;
min-height:100vh;
height:100vh;
position:sticky;
top:0;
overflow-y:auto;
align-self:flex-start;
flex-shrink:0;
}

.dark .menu{
background:#000;
}

.menu button{
width:100%;
text-align:left;
padding:10px;
border-radius:8px;
margin-bottom:6px;
}

.menu button:hover{
background:#222;
}

.hamburger-button{
display:none;
position:fixed;
top:14px;
left:14px;
z-index:50;
width:44px;
height:44px;
border-radius:8px;
background:#111;
color:white;
font-size:1.5rem;
line-height:1;
box-shadow:0 4px 12px rgba(0,0,0,.18);
}

.mobile-menu-overlay{
display:none;
position:fixed;
inset:0;
z-index:35;
background:rgba(15,23,42,.52);
}

.hidden{display:none;}

.storage-status{
margin-bottom:12px;
font-size:.85rem;
color:#b45309;
}

.chart-box{
height:320px;
position:relative;
}

.chart-box canvas{
width:100% !important;
height:100% !important;
}

.dark .storage-status{
color:#fbbf24;
}

@media(min-width:900px){
#taskList{
grid-template-columns:repeat(2,minmax(0,1fr));
}
}

@media(min-width:1280px){
#taskList{
grid-template-columns:repeat(3,minmax(0,1fr));
}
}

@media(max-width:900px){
.hamburger-button{
display:flex;
align-items:center;
justify-content:center;
}

.menu{
position:fixed;
z-index:45;
top:0;
left:0;
width:min(82vw,280px);
height:100vh;
transform:translateX(-100%);
transition:transform .25s ease;
box-shadow:8px 0 24px rgba(0,0,0,.22);
}

body.mobile-menu-open .menu{
transform:translateX(0);
}

body.mobile-menu-open .mobile-menu-overlay{
display:block;
}

body.mobile-menu-open{
overflow:hidden;
}

main{
padding-top:76px !important;
width:100%;
min-width:0;
}

.card{
padding:16px;
}

.chart-box{
height:260px;
}

.history-line{
grid-template-columns:1fr;
gap:4px;
border:1px solid #e2e8f0;
border-radius:12px;
margin-bottom:10px;
}

.history-line:first-child{
border-top:1px solid #e2e8f0;
}

.history-line .history-label{
display:block;
color:#64748b;
font-size:.72rem;
font-weight:700;
letter-spacing:.04em;
text-transform:uppercase;
}

.history-header{
display:none;
}
}

@media(max-width:520px){
main{
padding-left:12px !important;
padding-right:12px !important;
}

.chart-box{
height:230px;
}
}
</style>
</head>

<body id="body">

<button class="hamburger-button" onclick="toggleMobileMenu()" aria-label="Abrir menu" aria-controls="sideMenu" aria-expanded="false">
☰
</button>

<div class="mobile-menu-overlay" onclick="closeMobileMenu()"></div>

<div class="flex min-h-screen">

<!-- SIDEBAR -->
<div id="sideMenu" class="menu p-4">

<div class="flex items-center gap-3 mb-6">
<img src="assets/logo.png" width="40" alt="Logo">
<h2 class="text-lg font-semibold">Olá, Victor</h2>
</div>

<button onclick="show('openTasks')">📋 Tarefas em aberto</button>
<button onclick="show('history')">📅 Histórico</button>
<button onclick="show('dashboard')">📊 Dashboard</button>

<hr class="my-4">

<button onclick="toggleDark()">🌙 Modo Noturno</button>

</div>

<!-- CONTEÚDO -->
<main class="flex-1 p-6">

<!-- TAREFAS EM ABERTO -->
<section id="openTasks">

<h1 class="text-2xl font-bold mb-4">Tarefas em aberto</h1>

<div class="card">

<p id="storageStatus" class="storage-status hidden"></p>

<div class="grid grid-cols-1 lg:grid-cols-4 gap-2 mb-4">
<input id="taskInput" class="border p-2 text-black rounded" placeholder="Nova tarefa">
<input id="requesterInput" class="border p-2 text-black rounded" placeholder="Solicitante">
<input id="commentInput" class="border p-2 text-black rounded" placeholder="Comentário">

<div class="flex gap-2">
<select id="priority" class="border p-2 text-black rounded w-full">
<option value="alta">Alta</option>
<option value="media">Média</option>
<option value="baixa">Baixa</option>
</select>

<button onclick="addTask()" class="bg-blue-500 text-white px-4 rounded">
Adicionar
</button>
</div>
</div>

<ul id="taskList"></ul>

</div>
</section>

<!-- HISTÓRICO -->
<section id="history" class="hidden">

<h1 class="text-2xl font-bold mb-4">Histórico</h1>

<div class="card">
<button onclick="recoverSelectedHistory()" class="bg-blue-500 text-white px-4 py-2 rounded mb-4">
Recuperar
</button>
<div id="historyList"></div>
</div>

</section>

<!-- DASHBOARD -->
<section id="dashboard" class="hidden">

<h1 class="text-2xl font-bold mb-4">Dashboard</h1>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

<div class="card text-center">
<p>Total</p>
<h2 id="kpiTotal">0</h2>
</div>

<div class="card text-center">
<p>Concluídas</p>
<h2 id="kpiDone" class="text-green-500">0</h2>
</div>

<div class="card text-center">
<p>Pendentes</p>
<h2 id="kpiPending" class="text-red-500">0</h2>
</div>

<div class="card text-center">
<p>Produtividade</p>
<h2 id="kpiRate">0%</h2>
</div>

</div>

<div class="grid grid-cols-1 xl:grid-cols-2 gap-4 mt-4">

<div class="card">
<h2 class="text-lg font-semibold mb-4">Produção por dia</h2>
<div class="chart-box">
<canvas id="dailyProductionChart"></canvas>
</div>
</div>

<div class="card">
<h2 class="text-lg font-semibold mb-4">Status das tarefas</h2>
<div class="chart-box">
<canvas id="productivityChart"></canvas>
</div>
</div>

<div class="card xl:col-span-2">
<h2 class="text-lg font-semibold mb-4">Prioridades em aberto</h2>
<div class="chart-box">
<canvas id="priorityChart"></canvas>
</div>
</div>

</div>

</section>

</main>
</div>

<script>
/* ================= CONFIG ================= */

const openTasksKey="open_tasks";
const selectedHistory=new Set();
const storageCache=new Map();
const historySort={
field:"closedAt",
direction:"desc"
};
let dailyProductionChart=null;
let productivityChart=null;
let priorityChart=null;

const tarefasFixas=[
"Abertura Informe Diário",
"Fechamento Informe Diário"
];

/* ================= HELPERS ================= */

function localDate(){
const date=new Date();
const year=date.getFullYear();
const month=String(date.getMonth()+1).padStart(2,"0");
const day=String(date.getDate()).padStart(2,"0");
return `${year}-${month}-${day}`;
}

function formatDate(date){
if(!date)return "-";
const [year,month,day]=date.split("-");
return `${day}/${month}/${year}`;
}

function normalizeTask(task){
const status=task.status==="iniciada" || task.status==="finalizada"?task.status:"em_aberto";
return {
title:task.title||"",
requester:task.requester||"",
comment:task.comment||task.note||"",
includedAt:task.includedAt||localDate(),
closedAt:task.closedAt||"",
priority:task.priority||"media",
status:task.done?"finalizada":status,
done:Boolean(task.done)
};
}

function statusTexto(status){
const labels={
em_aberto:"Em aberto",
iniciada:"Iniciada",
finalizada:"Finalizada"
};
return labels[status]||labels.em_aberto;
}

function getHistoryKey(date){
return "history_"+date;
}

/* ================= MENU ================= */

function show(id){
document.querySelectorAll("#openTasks,#history,#dashboard")
.forEach(x=>x.classList.add("hidden"));

document.getElementById(id).classList.remove("hidden");
closeMobileMenu();

if(id==="history")loadHistory();
if(id==="dashboard")updateKPI();
}

function setMobileMenuState(isOpen){
document.body.classList.toggle("mobile-menu-open",isOpen);
const button=document.querySelector(".hamburger-button");
if(button){
button.setAttribute("aria-expanded",String(isOpen));
button.textContent=isOpen?"×":"☰";
}
}

function toggleMobileMenu(){
setMobileMenuState(!document.body.classList.contains("mobile-menu-open"));
}

function closeMobileMenu(){
setMobileMenuState(false);
}

window.addEventListener("keydown",event=>{
if(event.key==="Escape")closeMobileMenu();
});

window.addEventListener("resize",()=>{
if(window.innerWidth>900)closeMobileMenu();
});

/* ================= STORAGE ================= */

function setStorageStatus(message){
const status=document.getElementById("storageStatus");
if(!status)return;
status.textContent=message||"";
status.classList.toggle("hidden",!message);
}

function readLocalStorageArray(key){
try{
const value=localStorage.getItem(key);
if(!value)return [];
const parsed=JSON.parse(value);
return Array.isArray(parsed)?parsed:[];
}catch(error){
console.error(error);
return [];
}
}

function writeLocalStorageArray(key,value){
try{
localStorage.setItem(key,JSON.stringify(Array.isArray(value)?value:[]));
setStorageStatus("");
return true;
}catch(error){
console.error(error);
setStorageStatus("Nao foi possivel salvar no navegador. Verifique o espaco disponivel ou permissoes do browser.");
return false;
}
}

async function storageGet(key){
if(storageCache.has(key))return storageCache.get(key);

const localValue=readLocalStorageArray(key);
storageCache.set(key,localValue);
return localValue;
}

async function storageSet(key,value){
const normalizedValue=Array.isArray(value)?value:[];
storageCache.set(key,normalizedValue);
return writeLocalStorageArray(key,normalizedValue);
}

function localStorageKeys(prefix){
const keys=[];
for(let i=0;i<localStorage.length;i++){
const key=localStorage.key(i);
if(key && key.startsWith(prefix))keys.push(key);
}
return keys;
}

async function storageKeys(prefix){
return localStorageKeys(prefix);
}

async function getTasks(){
const tasks=await storageGet(openTasksKey);
return tasks.map(normalizeTask);
}

async function save(tasks){
return await storageSet(openTasksKey,tasks.map(normalizeTask));
}

async function getHistory(date){
const tasks=await storageGet(getHistoryKey(date));
return tasks.map(normalizeTask);
}

async function saveHistory(tasks,date){
return await storageSet(getHistoryKey(date),tasks.map(normalizeTask));
}

async function getAllHistoryTasks(){
let history=[];

const keys=await storageKeys("history_");
for(const key of keys){
if(key && key.startsWith("history_")){
const tasks=await storageGet(key);
history=history.concat(tasks.map(normalizeTask));
}
}

return history;
}

async function getAllHistoryEntries(){
let history=[];

const keys=await storageKeys("history_");
for(const key of keys){
if(key && key.startsWith("history_")){
const tasks=await storageGet(key);
tasks.forEach((task,index)=>{
history.push({
key,
index,
id:`${key}:${index}`,
task:normalizeTask(task)
});
});
}
}

return history;
}

/* ================= CRIAR BASE ================= */

async function criarBase(){
const tasks=await getTasks();

if(tasks.length===0){
tarefasFixas.forEach(t=>{
tasks.push({
title:t,
requester:"",
comment:"",
includedAt:localDate(),
priority:"alta",
status:"em_aberto",
done:false
});
});

await save(tasks);
}
}

/* ================= ADICIONAR ================= */

async function addTask(){
const input=document.getElementById("taskInput");
const requester=document.getElementById("requesterInput");
const comment=document.getElementById("commentInput");
const priority=document.getElementById("priority").value;

if(!input.value.trim())return;

const tasks=await getTasks();

tasks.push({
title:input.value.trim(),
requester:requester.value.trim(),
comment:comment.value.trim(),
includedAt:localDate(),
priority,
status:"em_aberto",
done:false
});

await save(tasks);
input.value="";
requester.value="";
comment.value="";
await loadTasks();
}

/* ================= AÇÕES ================= */

async function finishTask(i){
const tasks=await getTasks();
if(!tasks[i])return;

const closedAt=localDate();
const finishedTask={
...tasks[i],
done:true,
status:"finalizada",
closedAt
};

const history=await getHistory(closedAt);
history.push(finishedTask);
await saveHistory(history,closedAt);

tasks.splice(i,1);
await save(tasks);

await loadTasks();
}

async function editTask(i){
const tasks=await getTasks();
const task=tasks[i];

const title=prompt("Editar tarefa:",task.title);
if(title===null)return;

task.title=title.trim()||task.title;

const requester=prompt("Editar solicitante:",task.requester||"");
if(requester===null)return;

task.requester=requester.trim();

await save(tasks);
await loadTasks();
}

async function removeTask(i){
if(!confirm("Deseja excluir esta tarefa?"))return;

const tasks=await getTasks();
tasks.splice(i,1);
await save(tasks);
await loadTasks();
}

async function changePriority(i,value){
const tasks=await getTasks();
tasks[i].priority=value;
await save(tasks);
await loadTasks();
}

async function changeStatus(i,value){
const tasks=await getTasks();
tasks[i].status=value;
await save(tasks);
await loadTasks();
}

async function saveComment(i,value){
const tasks=await getTasks();
tasks[i].comment=value;
await save(tasks);
}

async function moveTask(fromIndex,toIndex){
if(fromIndex===toIndex || fromIndex<0 || toIndex<0)return;

const tasks=await getTasks();
if(fromIndex>=tasks.length || toIndex>=tasks.length)return;

const [task]=tasks.splice(fromIndex,1);
tasks.splice(toIndex,0,task);
await save(tasks);
await loadTasks();
}

function isInteractiveElement(element){
return Boolean(element.closest("button,input,select,textarea,label"));
}

async function recoverSelectedHistory(){
if(selectedHistory.size===0){
alert("Selecione uma tarefa concluída para recuperar.");
return;
}

const entries=(await getAllHistoryEntries())
.filter(entry=>selectedHistory.has(entry.id));

if(entries.length===0)return;

const openTasks=await getTasks();

entries.forEach(entry=>{
openTasks.push({
...entry.task,
done:false,
closedAt:""
});
});

await save(openTasks);

const byKey={};
entries.forEach(entry=>{
if(!byKey[entry.key])byKey[entry.key]=[];
byKey[entry.key].push(entry.index);
});

for(const key of Object.keys(byKey)){
const tasks=await storageGet(key);
byKey[key]
.sort((a,b)=>b-a)
.forEach(index=>tasks.splice(index,1));
await storageSet(key,tasks);
}

selectedHistory.clear();
await loadTasks();
await loadHistory();
}

/* ================= PRIORIDADE ================= */

function prioridadeIcon(p){
if(p==="alta")return "🔴";
if(p==="media")return "🟡";
return "🟢";
}

function prioridadeTexto(p){
if(p==="alta")return "Alta";
if(p==="media")return "Média";
return "Baixa";
}

/* ================= RENDER ================= */

function createField(label,value){
const wrapper=document.createElement("div");

const fieldLabel=document.createElement("p");
fieldLabel.className="task-label";
fieldLabel.textContent=label;

const fieldValue=document.createElement("p");
fieldValue.className="task-value break-words";
fieldValue.textContent=value||"-";

wrapper.appendChild(fieldLabel);
wrapper.appendChild(fieldValue);

return wrapper;
}

function render(tasks,target="taskList",readonly=false){
const ul=document.getElementById(target);
ul.innerHTML="";

if(!readonly && target==="taskList"){
ul.ondragover=e=>{
e.preventDefault();
};

ul.ondrop=e=>{
e.preventDefault();
const draggedIndex=Number(e.dataTransfer.getData("text/plain"));
const droppedOnCard=e.target.closest(".task-card");
if(!droppedOnCard && tasks.length>0){
moveTask(draggedIndex,tasks.length-1);
}
};
}

tasks.forEach((task,i)=>{
const t=normalizeTask(task);

const li=document.createElement("li");
li.className="task-card";

if(!readonly && target==="taskList"){
li.draggable=true;
li.dataset.index=i;
li.title="Arraste para reposicionar";

li.ondragstart=e=>{
if(isInteractiveElement(e.target)){
e.preventDefault();
return;
}
li.classList.add("dragging");
e.dataTransfer.effectAllowed="move";
e.dataTransfer.setData("text/plain",String(i));
};

li.ondragend=()=>{
li.classList.remove("dragging");
document.querySelectorAll(".task-card.drag-over")
.forEach(card=>card.classList.remove("drag-over"));
};

li.ondragover=e=>{
e.preventDefault();
const draggedIndex=Number(e.dataTransfer.getData("text/plain"));
if(draggedIndex!==i){
li.classList.add("drag-over");
}
};

li.ondragleave=()=>{
li.classList.remove("drag-over");
};

li.ondrop=e=>{
e.preventDefault();
e.stopPropagation();
li.classList.remove("drag-over");
const draggedIndex=Number(e.dataTransfer.getData("text/plain"));
moveTask(draggedIndex,i);
};
}

const header=document.createElement("div");
header.className="flex flex-col gap-3 mb-3";

const title=document.createElement("div");
const titleLabel=document.createElement("p");
titleLabel.className="task-label";
titleLabel.textContent="Tarefa";

const titleValue=document.createElement("h3");
titleValue.className=`text-base font-semibold break-words ${t.done?"line-through text-slate-500":"task-value"}`;
titleValue.textContent=`${prioridadeIcon(t.priority)} ${t.title}`;

title.appendChild(titleLabel);
title.appendChild(titleValue);

const actions=document.createElement("div");
actions.className="flex gap-2 flex-wrap";

if(!readonly){
const doneButton=document.createElement("button");
doneButton.className="bg-green-500 text-white px-3 py-1.5 rounded text-sm";
doneButton.title="Finalizar tarefa";
doneButton.textContent="Finalizar";
doneButton.onclick=()=>finishTask(i);

const editButton=document.createElement("button");
editButton.className="bg-slate-600 text-white px-3 py-1.5 rounded text-sm";
editButton.title="Editar tarefa";
editButton.textContent="Editar";
editButton.onclick=()=>editTask(i);

const removeButton=document.createElement("button");
removeButton.className="bg-red-500 text-white px-3 py-1.5 rounded text-sm";
removeButton.title="Excluir tarefa";
removeButton.textContent="Excluir";
removeButton.onclick=()=>removeTask(i);

actions.appendChild(doneButton);
actions.appendChild(editButton);
actions.appendChild(removeButton);
}

header.appendChild(title);
header.appendChild(actions);
li.appendChild(header);

const grid=document.createElement("div");
grid.className="grid grid-cols-1 sm:grid-cols-4 gap-3";

grid.appendChild(createField("Data de inclusão",formatDate(t.includedAt)));

grid.appendChild(createField("Solicitante",t.requester));

const priorityField=document.createElement("div");
const priorityLabel=document.createElement("p");
priorityLabel.className="task-label";
priorityLabel.textContent="Prioridade";

if(readonly){
const priorityValue=document.createElement("p");
priorityValue.className="task-value";
priorityValue.textContent=prioridadeTexto(t.priority);
priorityField.appendChild(priorityLabel);
priorityField.appendChild(priorityValue);
}else{
const prioritySelect=document.createElement("select");
prioritySelect.className="priority-select mt-1";
prioritySelect.innerHTML=`
<option value="alta">Alta</option>
<option value="media">Média</option>
<option value="baixa">Baixa</option>
`;
prioritySelect.value=t.priority;
prioritySelect.onchange=e=>changePriority(i,e.target.value);
priorityField.appendChild(priorityLabel);
priorityField.appendChild(prioritySelect);
}

grid.appendChild(priorityField);

const statusField=document.createElement("div");
const statusLabel=document.createElement("p");
statusLabel.className="task-label";
statusLabel.textContent="Status";

if(readonly){
const statusValue=document.createElement("p");
statusValue.className="task-value";
statusValue.textContent=statusTexto(t.status);
statusField.appendChild(statusLabel);
statusField.appendChild(statusValue);
}else{
const statusSelect=document.createElement("select");
statusSelect.className="priority-select mt-1";
statusSelect.innerHTML=`
<option value="em_aberto">Em aberto</option>
<option value="iniciada">Iniciada</option>
`;
statusSelect.value=t.status==="finalizada"?"em_aberto":t.status;
statusSelect.onchange=e=>changeStatus(i,e.target.value);
statusField.appendChild(statusLabel);
statusField.appendChild(statusSelect);
}

grid.appendChild(statusField);
li.appendChild(grid);

if(!readonly){
const commentWrapper=document.createElement("div");
commentWrapper.className="mt-4";

const commentLabel=document.createElement("p");
commentLabel.className="task-label mb-1";
commentLabel.textContent="Comentário";

const commentTextarea=document.createElement("textarea");
commentTextarea.className="comment-box w-full";
commentTextarea.placeholder="Adicionar comentário";
commentTextarea.value=t.comment||"";
commentTextarea.oninput=e=>saveComment(i,e.target.value);

commentWrapper.appendChild(commentLabel);
commentWrapper.appendChild(commentTextarea);
li.appendChild(commentWrapper);
}

ul.appendChild(li);
});
}

/* ================= LOAD ================= */

async function loadTasks(){
render(await getTasks());
}

async function loadHistory(){
const data=await getAllHistoryEntries();
renderHistory(data);
}

function getHistorySortValue(entry,field){
const task=normalizeTask(entry.task);

if(field==="title")return task.title.toLowerCase();
if(field==="requester")return task.requester.toLowerCase();
if(field==="comment")return task.comment.toLowerCase();
if(field==="priority")return prioridadeTexto(task.priority).toLowerCase();
if(field==="includedAt")return task.includedAt||"";
if(field==="closedAt")return task.closedAt||"";

return "";
}

function sortHistoryEntries(entries){
return [...entries]
.map((entry,index)=>({entry,index}))
.sort((a,b)=>{
const first=getHistorySortValue(a.entry,historySort.field);
const second=getHistorySortValue(b.entry,historySort.field);
let result=0;

if(historySort.field==="includedAt" || historySort.field==="closedAt"){
result=first.localeCompare(second);
}else{
result=first.localeCompare(second,"pt-BR",{sensitivity:"base"});
}

if(result===0)result=a.index-b.index;
return historySort.direction==="asc"?result:-result;
})
.map(item=>item.entry);
}

function toggleHistorySort(field){
if(historySort.field===field){
historySort.direction=historySort.direction==="asc"?"desc":"asc";
}else{
historySort.field=field;
historySort.direction="asc";
}

loadHistory();
}

function createHistoryHeaderButton(label,field){
const button=document.createElement("button");
button.type="button";
button.className="history-sort-button";

let indicator="";
if(historySort.field===field){
const isDate=field==="includedAt" || field==="closedAt";
if(isDate){
indicator=historySort.direction==="asc"?" antigo-novo":" novo-antigo";
}else{
indicator=historySort.direction==="asc"?" A-Z":" Z-A";
}
}

button.textContent=label+indicator;
button.onclick=()=>toggleHistorySort(field);
return button;
}

function createHistoryCell(label,value){
const wrapper=document.createElement("div");

const cellLabel=document.createElement("span");
cellLabel.className="history-label";
cellLabel.textContent=label;

const cellValue=document.createElement("span");
cellValue.textContent=value||"-";

wrapper.appendChild(cellLabel);
wrapper.appendChild(cellValue);

return wrapper;
}

function renderHistory(entries){
const list=document.getElementById("historyList");
list.innerHTML="";
const sortedEntries=sortHistoryEntries(entries);

if(sortedEntries.length===0){
const empty=document.createElement("p");
empty.className="text-slate-500";
empty.textContent="Nenhuma tarefa finalizada.";
list.appendChild(empty);
return;
}

const header=document.createElement("div");
header.className="history-header";

const emptyHeader=document.createElement("span");
header.appendChild(emptyHeader);

[
["Tarefa","title"],
["Solicitante","requester"],
["Comentário","comment"],
["Prioridade","priority"],
["Inclusão","includedAt"],
["Encerramento","closedAt"]
].forEach(([label,field])=>{
const span=document.createElement("span");
span.appendChild(createHistoryHeaderButton(label,field));
header.appendChild(span);
});

list.appendChild(header);

sortedEntries.forEach(entry=>{
const task=normalizeTask(entry.task);
const line=document.createElement("div");
line.className="history-line";

const checkboxWrapper=document.createElement("div");
const checkbox=document.createElement("input");
checkbox.type="checkbox";
checkbox.title="Selecionar tarefa concluída";
checkbox.checked=selectedHistory.has(entry.id);
checkbox.onchange=e=>{
if(e.target.checked){
selectedHistory.add(entry.id);
}else{
selectedHistory.delete(entry.id);
}
};
checkboxWrapper.appendChild(checkbox);

line.appendChild(checkboxWrapper);
line.appendChild(createHistoryCell("Tarefa",`${prioridadeIcon(task.priority)} ${task.title}`));
line.appendChild(createHistoryCell("Solicitante",task.requester));
line.appendChild(createHistoryCell("Comentário",task.comment));
line.appendChild(createHistoryCell("Prioridade",prioridadeTexto(task.priority)));
line.appendChild(createHistoryCell("Inclusão",formatDate(task.includedAt)));
line.appendChild(createHistoryCell("Encerramento",formatDate(task.closedAt)));

list.appendChild(line);
});
}

/* ================= KPI ================= */

async function updateKPI(){
const tasks=await getTasks();
const history=await getAllHistoryTasks();
const total=tasks.length+history.length;
const done=history.length;

document.getElementById("kpiTotal").innerText=total;
document.getElementById("kpiDone").innerText=done;
document.getElementById("kpiPending").innerText=tasks.length;

const rate=total?Math.round(done/total*100):0;
document.getElementById("kpiRate").innerText=rate+"%";

renderDashboardCharts(tasks,history);
}

function getChartColors(){
const dark=document.body.classList.contains("dark");
return {
text:dark?"#e5e7eb":"#0f172a",
grid:dark?"rgba(148,163,184,.22)":"rgba(100,116,139,.18)",
brandGreen:"#00c853",
done:"#006b3a",
pending:dark?"#4b5563":"#d1d5db",
high:"#ef4444",
medium:"#f59e0b",
low:"#22c55e",
line:"#00c853"
};
}

function createOrUpdateChart(instance,canvasId,config){
const canvas=document.getElementById(canvasId);
if(!canvas || typeof Chart==="undefined")return instance;

if(instance){
instance.data=config.data;
instance.options=config.options;
instance.update();
return instance;
}

return new Chart(canvas,config);
}

function renderDashboardCharts(tasks,history){
const colors=getChartColors();
const priorityCounts={alta:0,media:0,baixa:0};
tasks.forEach(task=>{
const priority=normalizeTask(task).priority;
priorityCounts[priority]=(priorityCounts[priority]||0)+1;
});

const productionByDate={};
history.forEach(task=>{
const closedAt=normalizeTask(task).closedAt||localDate();
productionByDate[closedAt]=(productionByDate[closedAt]||0)+1;
});

const productionDates=Object.keys(productionByDate).sort();
const lastDates=productionDates.slice(-7);
const dailyLabels=lastDates.map(formatDate);
const dailyValues=lastDates.map(date=>productionByDate[date]);

dailyProductionChart=createOrUpdateChart(dailyProductionChart,"dailyProductionChart",{
type:"bar",
data:{
labels:dailyLabels.length?dailyLabels:["Sem dados"],
datasets:[{
label:"Tarefas concluídas",
data:dailyValues.length?dailyValues:[0],
backgroundColor:colors.brandGreen,
hoverBackgroundColor:colors.done,
borderRadius:8
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{display:false}
},
scales:{
x:{ticks:{color:colors.text},grid:{color:colors.grid}},
y:{beginAtZero:true,ticks:{color:colors.text,precision:0},grid:{color:colors.grid}}
}
}
});

productivityChart=createOrUpdateChart(productivityChart,"productivityChart",{
type:"doughnut",
data:{
labels:["Produzido","Nao realizados"],
datasets:[{
data:[history.length,tasks.length],
backgroundColor:[colors.done,colors.pending],
hoverBackgroundColor:[colors.done,colors.pending],
borderWidth:0
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{position:"bottom",labels:{color:colors.text}}
},
rotation:-90,
circumference:180,
cutout:"72%"
}
});

priorityChart=createOrUpdateChart(priorityChart,"priorityChart",{
type:"bar",
data:{
labels:["Alta","Média","Baixa"],
datasets:[{
label:"Tarefas em aberto",
data:[priorityCounts.alta,priorityCounts.media,priorityCounts.baixa],
backgroundColor:[colors.high,colors.medium,colors.low],
borderRadius:8
}]
},
options:{
indexAxis:"y",
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{display:false}
},
scales:{
x:{beginAtZero:true,ticks:{color:colors.text,precision:0},grid:{color:colors.grid}},
y:{ticks:{color:colors.text},grid:{display:false}}
}
}
});
}

/* ================= DARK ================= */

function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark_mode",document.body.classList.contains("dark"));
if(!document.getElementById("dashboard").classList.contains("hidden")){
updateKPI();
}
}

function loadTheme(){
if(localStorage.getItem("dark_mode")==="true"){
document.body.classList.add("dark");
}
}

/* START */
async function start(){
loadTheme();
await criarBase();
await loadTasks();
}

start();
</script>
